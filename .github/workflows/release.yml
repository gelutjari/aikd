# .github/workflows/release.yml
name: Build All Platforms

on:
  push:
    tags: ['v*']  # Trigger saat tag release

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: aikd-linux-amd64
            compress: tar czf

          # Linux ARM64 (Raspberry Pi, AWS Graviton, dll)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: aikd-linux-arm64
            compress: tar czf
            apt_install: gcc-aarch64-linux-gnu

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: aikd-macos-amd64
            compress: tar czf

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: aikd-macos-arm64
            compress: tar czf

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aikd-windows-amd64.exe
            compress: ""

          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: aikd-windows-arm64.exe
            compress: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross tools
        if: matrix.apt_install
        run: sudo apt-get install -y ${{ matrix.apt_install }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p aikd-cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aikd dist/
          cd dist && ${{ matrix.compress }} ${{ matrix.artifact }}.tar.gz aikd

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/aikd.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/aikd-linux-amd64/aikd-linux-amd64.tar.gz
            artifacts/aikd-linux-arm64/aikd-linux-arm64.tar.gz
            artifacts/aikd-macos-amd64/aikd-macos-amd64.tar.gz
            artifacts/aikd-macos-arm64/aikd-macos-arm64.tar.gz
            artifacts/aikd-windows-amd64/aikd-windows-amd64.exe
            artifacts/aikd-windows-arm64/aikd-windows-arm64.exe
          generate_release_notes: true
